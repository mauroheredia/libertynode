<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibertyNode — Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:        #080c14;
            --panel:     #0e1420;
            --border:    #1e2d42;
            --green:     #00ff88;
            --blue:      #3b82f6;
            --text:      #e8edf5;
            --muted:     #4a5568;
            --mono:      'Space Mono', monospace;
            --sans:      'Syne', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ---- FONDO ANIMADO ---- */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.35;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            opacity: 0.12;
        }
        .glow-1 { background: var(--green); top: -150px; left: -150px; }
        .glow-2 { background: var(--blue);  bottom: -150px; right: -100px; }

        /* Líneas animadas de "circuito" */
        .circuit-line {
            position: fixed;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            height: 1px;
            opacity: 0;
            pointer-events: none;
            animation: sweep 8s ease-in-out infinite;
        }
        .circuit-line:nth-child(1) { width: 40%; top: 20%; left: -40%; animation-delay: 0s; }
        .circuit-line:nth-child(2) { width: 60%; top: 55%; left: -60%; animation-delay: 2.5s; }
        .circuit-line:nth-child(3) { width: 30%; top: 80%; left: -30%; animation-delay: 5s; }

        @keyframes sweep {
            0%   { left: -60%; opacity: 0; }
            20%  { opacity: 0.6; }
            80%  { opacity: 0.3; }
            100% { left: 110%; opacity: 0; }
        }

        /* ---- CARD ---- */
        .card {
            position: relative;
            z-index: 10;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 52px 48px;
            width: 440px;
            box-shadow:
                0 0 0 1px rgba(0,255,136,0.05),
                0 25px 60px rgba(0,0,0,0.6);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Borde superior verde */
        .card::before {
            content: '';
            position: absolute;
            top: -1px; left: 20%; right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            border-radius: 2px;
        }

        /* ---- LOGO ---- */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--blue), var(--green));
            border-radius: 12px;
            position: relative;
            flex-shrink: 0;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: 8px; left: 15px;
            width: 11px; height: 22px;
            background: white;
            clip-path: polygon(100% 0, 0 55%, 65% 55%, 15% 100%, 100% 30%, 35% 30%);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ---- HEADLINE ---- */
        .headline {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .headline span {
            color: var(--green);
        }

        .subline {
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* ---- BOTONES ---- */
        .btn-login {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 14px;
            text-align: left;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-github::before  { background: rgba(255,255,255,0.04); }
        .btn-google::before  { background: rgba(59,130,246,0.06); }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .btn-login:hover::before { opacity: 1; }

        .btn-github:hover { border-color: rgba(255,255,255,0.2); }
        .btn-google:hover { border-color: rgba(59,130,246,0.4); }

        .btn-login:active { transform: translateY(0); }

        .btn-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .btn-label { flex-grow: 1; }

        .btn-arrow {
            color: var(--muted);
            font-size: 1rem;
            transition: transform 0.2s, color 0.2s;
        }

        .btn-login:hover .btn-arrow {
            transform: translateX(4px);
            color: var(--green);
        }

        /* ---- DIVIDER ---- */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 6px 0 20px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ---- FOOTER ---- */
        .card-footer {
            margin-top: 36px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.7;
        }

        .card-footer a {
            color: var(--green);
            text-decoration: none;
        }

        /* ---- ESTADO DE CARGA ---- */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(8,12,20,0.92);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--green);
        }
        .loading-overlay.active { display: flex; }

        .spinner {
            width: 36px; height: 36px;
            border: 2px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- ERROR ---- */
        .error-msg {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: var(--mono);
            font-size: 0.78rem;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .error-msg.visible { display: block; }
    </style>
</head>
<body>

    <!-- Fondo -->
    <div class="bg-grid"></div>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="circuit-line"></div>
    <div class="circuit-line"></div>
    <div class="circuit-line"></div>

    <!-- Card de login -->
    <div class="card">

        <div class="logo-wrap">
            <div class="logo-icon"></div>
            <span class="logo-text">LibertyNode</span>
        </div>

        <div class="headline">
            Tu código,<br><span>tu soberanía.</span>
        </div>
        <p class="subline">
            Iniciá sesión para guardar tus flujos<br>y módulos en tu propia cuenta de GitHub.
        </p>

        <div class="error-msg" id="error-msg"></div>

        <!-- GitHub -->
        <button class="btn-login btn-github" id="btn-github" onclick="loginConGitHub()">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            <span class="btn-label">Continuar con GitHub</span>
            <span class="btn-arrow">→</span>
        </button>

        <div class="divider">o</div>

        <!-- Google -->
        <button class="btn-login btn-google" id="btn-google" onclick="loginConGoogle()">
            <svg class="btn-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span class="btn-label">Continuar con Google</span>
            <span class="btn-arrow">→</span>
        </button>

        <div class="card-footer">
            Al ingresar aceptás que tus flujos se guardan<br>
            en <strong>tu propia cuenta de GitHub</strong>. Nosotros no almacenamos código.<br><br>
            <a href="https://github.com/mauroheredia/libertynode" target="_blank">GitHub del proyecto</a> · 
            <a href="#">Código abierto</a>
        </div>

    </div>

    <!-- Overlay de carga -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <span id="loading-text">Conectando con GitHub...</span>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GithubAuthProvider, 
            GoogleAuthProvider,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyBIDHUcKrqJ9ig69eVe1fAYBaJvQ1or54k",
            authDomain:        "code-ai-39686.firebaseapp.com",
            projectId:         "code-ai-39686",
            storageBucket:     "code-ai-39686.firebasestorage.app",
            messagingSenderId: "292598315084",
            appId:             "1:292598315084:web:3b78a655cf2e4147d41ce9"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Proveedores
        const githubProvider = new GithubAuthProvider();
        githubProvider.addScope('repo');          // Para leer/escribir repos
        githubProvider.addScope('read:user');     // Para obtener el perfil

        const googleProvider = new GoogleAuthProvider();

        // Si ya está logueado, saltar directo al editor
        onAuthStateChanged(auth, (user) => {
            if (user) {
                mostrarCarga("Sesión activa. Abriendo editor...");
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
            }
        });

        // Helpers de UI
        function mostrarCarga(msg) {
            document.getElementById('loading-text').textContent = msg;
            document.getElementById('loading').classList.add('active');
        }

        function ocultarCarga() {
            document.getElementById('loading').classList.remove('active');
        }

        function mostrarError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function ocultarError() {
            document.getElementById('error-msg').classList.remove('visible');
        }

        // Login con GitHub
        window.loginConGitHub = async function() {
            ocultarError();
            mostrarCarga("Conectando con GitHub...");
            try {
                const result = await signInWithPopup(auth, githubProvider);
                
                // Guardamos el token de GitHub para usarlo en el editor
                const token = result.credential.accessToken;
                sessionStorage.setItem('gh_token', token);
                sessionStorage.setItem('gh_user',  result.user.displayName || result.user.email);
                
                mostrarCarga("¡Acceso concedido! Iniciando editor...");
                setTimeout(() => { window.location.href = 'index.html'; }, 900);

            } catch (err) {
                ocultarCarga();
                if (err.code === 'auth/popup-closed-by-user') {
                    mostrarError("Cerraste la ventana antes de completar el login.");
                } else if (err.code === 'auth/account-exists-with-different-credential') {
                    mostrarError("Ya existe una cuenta con ese email. Intentá con Google.");
                } else {
                    mostrarError(`Error: ${err.message}`);
                }
                console.error('[Auth] GitHub error:', err);
            }
        };

        // Login con Google
        window.loginConGoogle = async function() {
            ocultarError();
            mostrarCarga("Conectando con Google...");
            try {
                const result = await signInWithPopup(auth, googleProvider);
                
                sessionStorage.setItem('gh_user', result.user.displayName || result.user.email);
                
                mostrarCarga("¡Acceso concedido! Iniciando editor...");
                setTimeout(() => { window.location.href = 'index.html'; }, 900);

            } catch (err) {
                ocultarCarga();
                if (err.code === 'auth/popup-closed-by-user') {
                    mostrarError("Cerraste la ventana antes de completar el login.");
                } else {
                    mostrarError(`Error: ${err.message}`);
                }
                console.error('[Auth] Google error:', err);
            }
        };

    </script>

</body>
</html>
